
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       ./nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_iso8601] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /home/ubuntu/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    #gzip  on;

    server {
    listen 443 ssl;
    server_name api.auont.com;

    ssl_certificate     /home/ubuntu/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/conf/api.auont.com.pem;
    ssl_certificate_key /home/ubuntu/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/conf/api.auont.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;  # 推荐使用 TLSv1.2 或更高版本
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_ecdh_curve secp384r1;  # 使用椭圆曲线 Diffie-Hellman 参数以提高性能和安全性
    ssl_session_cache shared:SSL:10m;  # 控制 SSL 会话缓存的大小和生命周期
    ssl_session_timeout 10m;  # 设置 SSL 会话的超时时间
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";  # HSTS 头，增强安全性

    location / {
	    # 1. 隐藏后端可能返回的重复跨域头
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
    
	    add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,X-Requested-With' always;
	    
        #3. 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' '*' always; # 调试时先用 *
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204; # 关键：直接返回 204，不转发给后端
        }

        proxy_pass http://127.0.0.1:8001;    # 核心：转发到 8001 端口

        # 传递必要的请求头给后端应用，防止应用获取不到真实 IP 或协议
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 解决大文件上传超时（可选）
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
    }
  }
}
