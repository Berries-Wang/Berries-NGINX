server {
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name cc-manage.auont.com;

    ssl_certificate /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/cc-manage.auont.com.pem;
    ssl_certificate_key /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/cc-manage.auont.com.key;

    ssl_protocols TLSv1.2 TLSv1.3; # 推荐使用 TLSv1.2 或更高版本
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_ecdh_curve secp384r1; # 使用椭圆曲线 Diffie-Hellman 参数以提高性能和安全性
    ssl_session_cache shared:SSL:10m; # 控制 SSL 会话缓存的大小和生命周期
    ssl_session_timeout 1d; # 设置 SSL 会话的超时时间
    keepalive_timeout 75s;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"; # HSTS 头，增强安全性
    # 【HTTP/3 核心】宣告支持 HTTP/3，务必加上 always 参数
    add_header Alt-Svc 'h3=":443"; ma=86400' always; # 宣告服务器支持 HTTP/3 (QUIC) 协议的关键指令。它通过向客户端（如浏览器）发送一个名为 Alt-Svc（Alternative Services，备选服务）的 HTTP 响应头，来实现从 HTTP/2 到 HTTP/3 的平滑过渡

    location / {
        root /var/CYBERCLOAK/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }


    location ^~ /api/ {

        # 1. 隐藏后端可能返回的重复跨域头
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,X-Requested-With' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' '*' always; # 调试时先用 *
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204; # 关键：直接返回 204，不转发给后端
        }

        # 传递必要的请求头给后端应用，防止应用获取不到真实 IP 或协议
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 设备信息请求头（由 Nginx 解析 User-Agent 等信息传递）
        proxy_set_header X-Client-IP $remote_addr;
        proxy_set_header X-Device-Type $http_user_agent;
        proxy_set_header X-OS $http_user_agent;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header X-Referer $http_referer;

        # 解决大文件上传超时（可选）
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;

        proxy_pass http://127.0.0.1:8088; # 核心：转发到 8003 端口
    }
}
