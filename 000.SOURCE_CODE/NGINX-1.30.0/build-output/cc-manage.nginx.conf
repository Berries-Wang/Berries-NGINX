http {
	map $http_upgrade $connection_upgrade {
                default upgrade;
                ''      close;
        }
        lua_shared_dict cloak_cache 10m;  # 10MB 共享内存，存储 Cloak 检查结果缓存
        
		# ja4 指纹计算库路径，确保 resty.ja4 模块在这个路径下可用
        lua_package_path "/usr/local/openresty/lualib/?.lua;;";

        include ./nginx/mime.types;
        default_type application/octet-stream;
        log_format main '$remote_addr - $remote_user [$time_iso8601] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for"';
        access_log /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/nginx/access.log main;
        sendfile on;
        #tcp_nopush     on;
        #keepalive_timeout  0;
        keepalive_timeout 65;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        #gzip  on;
        include /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/serviers/*.nginx.conf;
        include /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/sites-enabled/*;
        include /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/conf.d/*;
}

server {
        listen 443 ssl;
        listen 443 quic;
        http2 on;
        server_name cc-manage.auont.com;

        ssl_certificate /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/cc-manage.auont.com.pem;
        ssl_certificate_key /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/cc-manage.auont.com.key;

        ssl_protocols TLSv1.3; # 推荐使用 TLSv1.2 或更高版本
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
        ssl_ecdh_curve secp384r1; # 使用椭圆曲线 Diffie-Hellman 参数以提高性能和安全性
        ssl_session_cache shared:SSL:10m; # 控制 SSL 会话缓存的大小和生命周期
        ssl_session_timeout 10m; # 设置 SSL 会话的超时时间
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"; # HSTS 头，增强安全性
        add_header Alt-Svc 'h3=":443"; ma=86400';

        # 定义变量，用于存储 JA4 指纹
        set $ja4_fingerprint "";
        set $ja4_debug "";

        ssl_client_hello_by_lua_block {
                local ok, ja4 = pcall(require, "resty.ja4")
                        if ok then
                        ngx.ctx.ja4_fingerprint = ja4.compute() or "unknown"
                        else
                        ngx.log(ngx.WARN, "[JA4] failed: ", ja4)
                        ngx.ctx.ja4_fingerprint = "unknown"
                        end
                }
        # 变量写操作移到这里
        rewrite_by_lua_block {
                ngx.var.ja4_fingerprint = ngx.ctx.ja4_fingerprint or "unknown"
                }

        location / {
                root /var/CYBERCLOAK/dist;
                index index.html;
                try_files $uri $uri/ /index.html;
        }

        location ~ ^/(api|gateway)/ {
                # 将 JA4 指纹通过请求头透传给后端
                proxy_set_header X-JA4-Fingerprint $ja4_fingerprint;

                # 1. 隐藏后端可能返回的重复跨域头
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';

                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,X-Requested-With' always;
                if ($request_method = 'OPTIONS') {
                        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                        add_header 'Access-Control-Allow-Headers' '*' always; # 调试时先用 *
                        add_header 'Access-Control-Allow-Credentials' 'true' always;
                        add_header 'Access-Control-Max-Age' 1728000;
                        add_header 'Content-Type' 'text/plain; charset=utf-8';
                        add_header 'Content-Length' 0;
                        return 204; # 关键：直接返回 204，不转发给后端
                }

                # 传递必要的请求头给后端应用，防止应用获取不到真实 IP 或协议
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # 设备信息请求头（由 Nginx 解析 User-Agent 等信息传递）
                proxy_set_header X-Client-IP $remote_addr;
                proxy_set_header X-Device-Type $http_user_agent;
                proxy_set_header X-OS $http_user_agent;
                proxy_set_header Accept-Language $http_accept_language;
                proxy_set_header X-Referer $http_referer;

                # 解决大文件上传超时（可选）
                proxy_connect_timeout 90;
                proxy_send_timeout 90;
                proxy_read_timeout 90;

                proxy_pass http://127.0.0.1:8088; # 核心：转发到 8003 端口
        }
}