
#user  nobody;

# Worker 进程数
# 原理：每个 worker 是单线程事件驱动模型。设为 auto 让 Nginx 自动探测 CPU 核心数，
# 与核心数一一绑定可使 CPU 缓存的亲和性最优。设为 CPU 核心数 -1 可以留一个
# 核心给系统和其他进程（如日志收集、监控 agent）。
# 场景建议：
#   - 纯 Nginx 服务器：auto
#   - 混合部署（同机器有后端服务）：CPU 核心数 / 2
worker_processes auto;

# Worker 进程 CPU 亲和性绑定
# 原理：将每个 worker 进程绑定到固定 CPU 核心，利用 CPU 本地缓存，
# 减少进程在不同核心间切换时 L1/L2 缓存失效的开销。
# auto 表示 Nginx 自动分配。
worker_cpu_affinity auto;

# Worker 进程最大文件描述符数
# 原理：每个 worker 进程能打开的最大 fd 数量。此值必须 >= worker_connections * 2
# （考虑反向代理场景，每个客户端占用 client+upstream 两个连接，加上静态文件、
# 日志文件、共享内存 fd 等）。如果不够会出现 "too many open files" 错误。
worker_rlimit_nofile 65535;

# Worker 进程优雅关闭超时（秒）
# 原理：nginx -s quit 或 reload 时，worker 等待当前连接处理完成的最大时间。
# 超时后强制关闭，防止旧 worker 永不退出。容器化部署尤其重要。
worker_shutdown_timeout 30s;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

pid /root/apps/Berries-NGINX/000.SOURCE_CODE/NGINX-1.24.0/build-output/nginx/nginx.pid;

events {
    worker_connections 1024;
    
    # I/O 多路复用模型
    # 原理：epoll 是 Linux 内核 2.6+ 的高性能 I/O 模型，使用红黑树+就绪链表
    # 管理大量 fd，时间复杂度 O(1)。与 select/poll 的 O(n) 遍历相比，
    # 在 10k+ 并发连接时性能差距可达数量级。
    # 注意：FreeBSD 用 kqueue，Windows 用 select（自动选择）。
    use epoll;

    # 单个 worker 进程最大并发连接数
    # 原理：此值受 worker_rlimit_nofile 限制，实际受系统内存影响：
    #   每个连接约占用 4KB-10KB 内存（取决于 buffer 配置）。
    #   10240 连接 ≈ 40MB-100MB 内存
    #   65535 连接 ≈ 256MB-650MB 内存
    # 反向代理容量公式：可服务客户端数 = worker_processes * worker_connections / 2
    #   （每个客户端占用 client←→nginx + nginx←→upstream 两个连接）
    worker_connections 10240;

    # 一次接受所有新连接
    # 原理：默认每个事件循环只 accept 一个新连接。开启后一次性 accept 所有
    # 在内核队列中等待的新连接，减少 epoll_wait 返回次数。
    # 在高并发新建连接场景下可提升 QPS 10%~15%。
    # 注意：低负载场景无显著效果，且如果 worker 数 > 1 可能造成负载不均。
    multi_accept on;
}


http {
    include ./nginx/mime.types;
    default_type application/octet-stream;

    # 访问日志格式:json
    log_format main_json escape=json '{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_cache_status":"$upstream_cache_status",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
    '}';

    # 缓冲写入访问日志
    # 原理：默认每条日志都立即写磁盘（write 系统调用），高 QPS 下 IOPS 极高。
    # 开启 buffer 后日志先写入内存缓冲区，达到 32KB 或 5 秒后才刷盘。
    # IOPS 可降低约 60%，代价是最多丢失 5 秒的日志数据。
    access_log /var/log/nginx/access.log main_json buffer=32k flush=5s;

    # 错误日志级别
    # 原理：生产环境用 warn 或 error，避免 info/debug 级别的海量日志刷盘。
    error_log /var/log/nginx/error.log warn;

    # sendfile 零拷贝传输
    # 原理：传统文件传输路径：磁盘 → 内核缓冲区 → 用户态缓冲区 → 内核 socket 缓冲区 → 网卡。
    # sendfile 使用 DMA 和内核态直接传递：磁盘 → 内核缓冲区 → 内核 socket 缓冲区 → 网卡，
    # 避免了用户态/内核态的两次数据拷贝和上下文切换。静态文件吞吐可提升 20%~30%。
    # 场景限制：仅适用于静态文件直接返回，反向代理不经过此路径。
    sendfile on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout 65;
    keepalive_timeout 65;
	proxy_buffer_size 128k;
	proxy_buffers 4 256k;
	proxy_busy_buffers_size 256k;

    #gzip  on;

    server {
        listen 9000;
        #root /home/wei/WorkSpace/open_source/To-Sweet-Heart/dist;

        #charset koi8-r;

        #access_log  logs/host.access.log  main;
        location / {
            root /home/wei/OPEN_SOURCE/To-Sweet-Heart/dist;
            index index.html index.htm;
        }

        location /hello_lua {
            default_type 'text/plain';
            content_by_lua 'ngx.say("hello, lua")';
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}
